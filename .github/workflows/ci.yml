name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # The integration tests (tests/integration.rs) skip gracefully when jj/zsh
      # are absent, so install them here to exercise the version-sensitive jj
      # layer and the shell shim for real. zsh via apt is reliable; the jj binary
      # download is best-effort — if it fails, that one test simply skips.
      - name: Install zsh + jj (integration test deps)
        env:
          JJ_VERSION: "0.42.0"
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq zsh
          URL="https://github.com/jj-vcs/jj/releases/download/v${JJ_VERSION}/jj-v${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          if curl -fsSL "$URL" -o /tmp/jj.tar.gz; then
            tar -xzf /tmp/jj.tar.gz -C /tmp
            JJ_BIN="$(find /tmp -maxdepth 2 -name jj -type f | head -1)"
            sudo install -m 0755 "$JJ_BIN" /usr/local/bin/jj
            jj --version
          else
            echo "::warning::jj ${JJ_VERSION} download failed — the jj integration test will skip"
          fi

      - name: Test
        run: cargo test
